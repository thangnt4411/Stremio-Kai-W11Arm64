name: Bug Report
description: Create a report to help us improve Stremio Kai
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Also tell us, what did you expect to happen?
      placeholder: Tell us what you see!
    validations:
      required: true
  - type: textarea
    id: pc-specs
    attributes:
      label: PC Specifications
      description: |
        Please provide your hardware details:
        - CPU:
        - GPU:
        - RAM:
        - OS Version:
        - Resolution:
        - Scale:
      placeholder: |
        CPU: AMD Ryzen 5 5600X
        GPU: NVIDIA RTX 3070
        RAM: 16GB
        OS: Windows 11
        Resolution: 1920x1080
        Scale: 100%
    validations:
      required: true
  - type: markdown
    attributes:
      value: |
        > [!IMPORTANT]
        > **AV1 streams and RTX enhancements (HDR/Super Resolution) are NOT supported.**
        > If your report concerns AV1 or RTX-related issues, it will be ignored and closed immediately. Please ensure these are disabled before reporting.
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: |
        1. Go to '...'
        2. Click on '...'
        3. Scroll down to '...'
        4. See error
      placeholder: Steps to reproduce the behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Please copy and paste any relevant log output of your `LOGS.log` file here, or the entire file if you are reporting a crash.
      render: shell
