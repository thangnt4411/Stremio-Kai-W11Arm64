name: Bug Report
description: Create a report to help us improve Stremio Kai
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Also tell us, what did you expect to happen?
      placeholder: Tell us what you see!
    validations:
      required: true
  - type: dropdown
    id: resolution
    attributes:
      label: Display resolution
      description: Select the display resolution where the issue occurred. If your resolution is not listed, choose "Other" and provide details below.
      options:
        - 3840x2160
        - 3440x1440
        - 2560x1440
        - 2560x1080
        - 1920x1200
        - 1920x1080
        - 1680x1050
        - 1600x900
        - 1536x864
        - 1440x900
        - 1366x768
        - 1280x720
        - Other (please specify)
    validations:
      required: true
  - type: input
    id: resolution-other
    attributes:
      label: If Other, specify resolution
      description: "Example: 1792x828, 3024x1964, etc."
      placeholder: e.g. 1792x828
    validations:
      required: false
  - type: dropdown
    id: scale
    attributes:
      label: Windows display scale
      description: Select the Windows display scaling setting used. If your scale is not listed, choose "Other" and provide details below.
      options:
        - 100%
        - 125%
        - 150%
        - 175%
        - 200%
        - 225%
        - 250%
        - 300%
        - Other (please specify)
    validations:
      required: true
  - type: input
    id: scale-other
    attributes:
      label: If Other, specify scale
      description: "Example: 110%, 140%, custom scale (enter numeric percent)"
      placeholder: e.g. 110%
    validations:
      required: false
  - type: textarea
    id: pc-specs
    attributes:
      label: PC Specifications
      description: |
        Please provide your hardware details:
        - CPU:
        - GPU:
        - RAM:
        - OS Version:
      placeholder: |
        CPU: AMD Ryzen 5 5600X
        GPU: NVIDIA RTX 3070
        RAM: 16GB
        OS: Windows 11
    validations:
      required: true
  - type: markdown
    attributes:
      value: |
        > [!IMPORTANT]
        > **AV1 streams and RTX enhancements (HDR/Super Resolution) are NOT supported.**
        > If your report concerns AV1 or RTX-related issues, it will be ignored and closed immediately. Please ensure these are disabled before reporting.
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: |
        1. Go to '...'
        2. Click on '...'
        3. Scroll down to '...'
        4. See error
      placeholder: Steps to reproduce the behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Please copy and paste any relevant log output of your `LOGS.log` file here, or the entire file if you are reporting a crash.
      render: shell
